<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cobros | Cajeros</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h1 { color: #1a1a1a; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .search-box { margin: 20px 0; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
        button { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-search { background: #2563eb; color: white; }
        .btn-pdf { background: #10b981; color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { background: #f8fafc; padding: 12px; text-align: left; color: #64748b; font-size: 13px; text-transform: uppercase; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
        .status { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-paid { background: #dcfce7; color: #166534; }
        .status-pending { background: #fef9c3; color: #854d0e; }
        .note-input { width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Panel de Control de Cobros</h1>
        
        <div class="search-box">
            <input type="text" id="cajeroId" placeholder="Ingresa tu Customer ID (ej: cajero_marcos)">
            <button class="btn-search" onclick="fetchCobros()">Consultar</button>
            <button class="btn-pdf" onclick="generatePDF()">PDF</button>
        </div>

        <table id="mainTable">
            <thead>
                <tr>
                    <th>ID Operación</th>
                    <th>Monto</th>
                    <th>Estado</th>
                    <th>Nota del Cajero</th>
                </tr>
            </thead>
            <tbody id="tablaBody"></tbody>
        </table>
    </div>

    <script>
        let currentData = [];

        async function fetchCobros() {
            const id = document.getElementById('cajeroId').value;
            if(!id) return alert("Por favor ingresa un ID");
            
            const res = await fetch(`/api/cobros/${id}`);
            currentData = await res.json();
            
            const body = document.getElementById('tablaBody');
            body.innerHTML = '';

            currentData.forEach(c => {
                const row = `<tr>
                    <td>${c.collection_id}</td>
                    <td><b>$${c.amount}</b></td>
                    <td><span class="status ${c.status === 'approved' ? 'status-paid' : 'status-pending'}">${c.status}</span></td>
                    <td>
                        <input type="text" class="note-input" value="${c.comentario_local || ''}" 
                        onchange="updateNote('${c.collection_id}', this.value)" placeholder="Agregar nota...">
                    </td>
                </tr>`;
                body.innerHTML += row;
            });
        }

        async function updateNote(id, note) {
            await fetch('/api/comentar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ collection_id: id, comentario: note })
            });
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Reporte Diario de Caja", 14, 15);
            const rows = currentData.map(c => [c.collection_id, `$${c.amount}`, c.status, c.comentario_local || ""]);
            doc.autoTable({ head: [['ID', 'Monto', 'Estado', 'Nota']], body: rows, startY: 25 });
            doc.save(`Reporte_${new Date().toLocaleDateString()}.pdf`);
        }
    </script>
</body>
</html>
